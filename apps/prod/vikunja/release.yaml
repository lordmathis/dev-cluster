apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vikunja
  namespace: vikunja
spec:
  interval: 1h
  chart:
    spec:
      chart: vikunja
      version: v2.0.2
      sourceRef:
        kind: HelmRepository
        name: vikunja
        namespace: vikunja
      interval: 1h
  valuesFrom:
    - kind: ConfigMap
      name: vikunja-prod-values