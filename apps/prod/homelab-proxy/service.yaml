apiVersion: v1
kind: Service
metadata:
  name: homelab-proxy
  namespace: homelab-proxy
  annotations:
    tailscale.com/tailnet-fqdn: ${HOMELAB_TAILNET_FQDN}
    tailscale.com/env-TS_FORCE_RELAY_ONLY: "true"
    tailscale.com/env-TS_DEBUG_ALWAYS_USE_DERP: "true"
spec:
  type: ExternalName
  externalName: placeholder
  ports:
    - port: ${HOMELAB_INTERNAL_PORT}
      name: http
